      <section class="section">
        <div class="section-heading">
          <h1>ASCII ART 변환기</h1>
          <p>TEXT2ART와 IMAGE2ART를 브라우저에서 바로 생성합니다.</p>
        </div>
        <div class="tool-shell">
          <div class="segmented-control" role="tablist" aria-label="ASCII ART 모드">
            <button class="segment-button is-active" id="text-mode" type="button" role="tab" aria-selected="true" data-mode="text">TEXT2ART</button>
            <button class="segment-button" id="image-mode" type="button" role="tab" aria-selected="false" data-mode="image">IMAGE2ART</button>
          </div>

          <div class="ascii-panel is-active" id="text-panel">
            <label class="field-label" for="ascii-input">TEXT2ART</label>
            <textarea id="ascii-input" class="tool-textarea" placeholder="WEB TOOL"></textarea>
          </div>

          <div class="ascii-panel" id="image-panel" hidden>
            <label class="field-label" for="image-input">IMAGE2ART</label>
            <input id="image-input" class="tool-input" type="file" accept="image/*">
            <div class="form-grid">
              <label class="field-label" for="image-width">폭</label>
              <input id="image-width" class="tool-input" type="number" min="24" max="160" step="4" value="80">
              <label class="field-label" for="charset-select">문자셋</label>
              <select id="charset-select" class="tool-input">
                <option value="@%#*+=-:. ">Dense</option>
                <option value="MNHQ$OC?7>!:-;. ">Soft</option>
                <option value="█▓▒░ ">Block</option>
              </select>
            </div>
            <label class="check-row"><input id="invert-output" type="checkbox"> <span>반전</span></label>
            <canvas id="image-canvas" hidden></canvas>
          </div>

          <div class="tool-actions">
            <button class="button" id="generate" type="button">생성하기</button>
            <button class="button secondary" id="sample" type="button">테스트 예문</button>
            <button class="button secondary" id="copy" type="button">복사</button>
            <button class="button secondary" id="clear" type="button">지우기</button>
          </div>
          <output id="ascii-status" class="status-line">결과가 여기에 표시됩니다.</output>
          <output id="ascii-output" class="result-panel ascii-output">결과가 여기에 표시됩니다.</output>
        </div>
